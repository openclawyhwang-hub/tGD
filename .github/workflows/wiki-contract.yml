name: tGD Wiki contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  wiki-contract:
    name: Wiki layout/brand contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install --quiet jinja2

      - name: Verify wiki layout/brand contract
        run: bash scripts/ci-verify-wiki.sh
