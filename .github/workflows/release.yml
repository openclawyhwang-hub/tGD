name: Release

on:
  push:
    paths:
      - '.tgd-version'
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat .tgd-version)
          # Ensure version starts with 'v'
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} does not exist, will create release"
          fi

      - name: Generate changelog
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
            echo "prev_tag=" >> $GITHUB_OUTPUT
          fi
          
          # Save changelog to file for multi-line output
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.changelog.outputs.prev_tag }}"
          
          # Read changelog
          CHANGELOG=$(cat /tmp/changelog.txt)
          
          # Create release notes
          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/openclawyhwang-hub/tGD/compare/${PREV_TAG}...${VERSION}"
          else
            COMPARE_URL="https://github.com/openclawyhwang-hub/tGD/commits/${VERSION}"
          fi
          
          RELEASE_NOTES=$(cat <<EOF
          ## tGD $VERSION
          
          ### Changes
          $CHANGELOG
          
          ---
          **Full Changelog**: $COMPARE_URL
          EOF
          )
          
          # Create tag and release
          gh release create "$VERSION" \
            --title "tGD $VERSION" \
            --notes "$RELEASE_NOTES" \
            --latest
          
          echo "✅ Release $VERSION created successfully!"
