name: Release

on:
  push:
    paths:
      - 'VERSION'
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          # Ensure version starts with 'v'
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} does not exist, will create release"
          fi

      - name: Generate categorized changelog
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|||%h" "$PREV_TAG"..HEAD)
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          else
            COMMITS=$(git log --pretty=format:"%s|||%h" -30)
            echo "prev_tag=" >> $GITHUB_OUTPUT
          fi

          # Categorize commits
          FEATS=""
          FIXES=""
          DOCS=""
          REFACTORS=""
          TESTS=""
          CHORES=""
          OTHERS=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            MSG="${line%%|||*}"
            HASH="${line##*|||}"
            DISPLAY_MSG="$MSG"

            case "$MSG" in
              feat*:*|feat*)
                FEATS="${FEATS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              fix*:*|fix*)
                FIXES="${FIXES}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              docs*:*|docs*)
                DOCS="${DOCS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              refactor*:*|refactor*)
                REFACTORS="${REFACTORS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              test*:*|test*)
                TESTS="${TESTS}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              chore*:*|chore*)
                CHORES="${CHORES}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              ci*:*|ci*)
                CHORES="${CHORES}- ${DISPLAY_MSG#*: } (\`$HASH\`)\n"
                ;;
              *)
                OTHERS="${OTHERS}- ${DISPLAY_MSG} (\`$HASH\`)\n"
                ;;
            esac
          done <<< "$COMMITS"

          # Build release notes
          build_section() {
            local title="$1"
            local content="$2"
            if [ -n "$content" ]; then
              echo "### $title"
              echo -e "$content"
            fi
          }

          RELEASE_NOTES="## tGD $VERSION\n\n"
          [ -n "$FEATS" ]     && RELEASE_NOTES+=$(build_section "✨ Features" "$FEATS")"\n"
          [ -n "$FIXES" ]     && RELEASE_NOTES+=$(build_section "🐛 Bug Fixes" "$FIXES")"\n"
          [ -n "$DOCS" ]      && RELEASE_NOTES+=$(build_section "📝 Documentation" "$DOCS")"\n"
          [ -n "$REFACTORS" ] && RELEASE_NOTES+=$(build_section "♻️ Refactoring" "$REFACTORS")"\n"
          [ -n "$TESTS" ]     && RELEASE_NOTES+=$(build_section "✅ Tests" "$TESTS")"\n"
          [ -n "$CHORES" ]    && RELEASE_NOTES+=$(build_section "🔧 Chores" "$CHORES")"\n"
          [ -n "$OTHERS" ]    && RELEASE_NOTES+=$(build_section "📦 Other Changes" "$OTHERS")"\n"

          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/openclawyhwang-hub/tGD/compare/${PREV_TAG}...${VERSION}"
          else
            COMPARE_URL="https://github.com/openclawyhwang-hub/tGD/commits/${VERSION}"
          fi

          RELEASE_NOTES+="---\n**Full Changelog**: $COMPARE_URL"

          # Save to file for multi-line output
          echo -e "$RELEASE_NOTES" > /tmp/release-notes.md

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          gh release create "$VERSION" \
            --title "tGD $VERSION" \
            --notes-file /tmp/release-notes.md \
            --latest

          echo "✅ Release $VERSION created successfully!"
