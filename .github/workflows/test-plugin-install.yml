name: Test Plugin Installation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-skills:
    name: Validate skill content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all skills
        run: node scripts/validate-skills.js

  validate:
    name: Validate plugin structure
    needs: validate-skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .

  test-install:
    name: Test plugin installation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Install plugin
        run: claude plugin install tGD@addy-tGD --scope user

  test-setup:
    name: Test setup.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh
        run: bash setup.sh
        env:
          CI: "true"

      - name: Verify symlinks exist
        run: |
          PASS=true
          for link in \
            "$HOME/.codex/skills/tgd-rules" \
            "$HOME/.config/opencode/skills/tgd-rules" \
            "$HOME/.gemini/skills/tgd-rules" \
            "$HOME/.pi/agent/skills/tgd-rules" \
            "$HOME/.hermes/skills/tgd-rules" \
          ; do
            if [ ! -L "$link" ] && [ ! -f "$link" ]; then
              echo "❌ Missing: $link"
              PASS=false
            else
              echo "✅ Found: $link"
            fi
          done
          $PASS || exit 1

      - name: Run setup.sh again (idempotency)
        run: bash setup.sh
        env:
          CI: "true"
