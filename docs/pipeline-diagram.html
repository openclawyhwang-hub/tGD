<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e11d48"/><stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="16" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="1">tGD — AI Agent Development Pipeline</text>
  <text x="600" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">Production-grade engineering skills for Claude Code, Codex, Gemini CLI &amp; OpenCode</text>

  <!-- Phase 1: MAP -->
  <rect x="30" y="95" width="130" height="72" rx="10" fill="url(#cyan)" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
  <text x="95" y="122" text-anchor="middle" fill="#ecfeff" font-size="18">🔍</text>
  <text x="95" y="142" text-anchor="middle" fill="#ecfeff" font-size="12" font-weight="600">MAP</text>
  <text x="95" y="156" text-anchor="middle" fill="#a5f3fc" font-size="9">Context + CodeGraph</text>
  <text x="95" y="180" text-anchor="middle" fill="#67e8f9" font-size="8">/tgd-map</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="131" x2="180" y2="131" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: DEFINE -->
  <rect x="180" y="95" width="130" height="72" rx="10" fill="url(#green)" stroke="#34d399" stroke-width="1.5" filter="url(#glow)"/>
  <text x="245" y="122" text-anchor="middle" fill="#ecfdf5" font-size="18">📋</text>
  <text x="245" y="142" text-anchor="middle" fill="#ecfdf5" font-size="12" font-weight="600">DEFINE</text>
  <text x="245" y="156" text-anchor="middle" fill="#a7f3d0" font-size="9">PRD + Spec + Design</text>
  <text x="245" y="180" text-anchor="middle" fill="#6ee7b7" font-size="8">/tgd-define</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="131" x2="330" y2="131" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: PLAN -->
  <rect x="330" y="95" width="130" height="72" rx="10" fill="url(#blue)" stroke="#60a5fa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="395" y="122" text-anchor="middle" fill="#eff6ff" font-size="18">📐</text>
  <text x="395" y="142" text-anchor="middle" fill="#eff6ff" font-size="12" font-weight="600">PLAN</text>
  <text x="395" y="156" text-anchor="middle" fill="#bfdbfe" font-size="9">Tasks + Jira Sync</text>
  <text x="395" y="180" text-anchor="middle" fill="#93c5fd" font-size="8">/tgd-plan</text>

  <!-- Arrow 3→4 -->
  <line x1="460" y1="131" x2="480" y2="131" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4: BUILD -->
  <rect x="480" y="95" width="130" height="72" rx="10" fill="url(#purple)" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="545" y="122" text-anchor="middle" fill="#f5f3ff" font-size="18">⚡</text>
  <text x="545" y="142" text-anchor="middle" fill="#f5f3ff" font-size="12" font-weight="600">BUILD</text>
  <text x="545" y="156" text-anchor="middle" fill="#ddd6fe" font-size="9">TDD + Incremental</text>
  <text x="545" y="180" text-anchor="middle" fill="#c4b5fd" font-size="8">/tgd-develop</text>

  <!-- Arrow 4→5 -->
  <line x1="610" y1="131" x2="630" y2="131" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5: VERIFY -->
  <rect x="630" y="95" width="130" height="72" rx="10" fill="url(#amber)" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow)"/>
  <text x="695" y="122" text-anchor="middle" fill="#fffbeb" font-size="18">🧪</text>
  <text x="695" y="142" text-anchor="middle" fill="#fffbeb" font-size="12" font-weight="600">VERIFY</text>
  <text x="695" y="156" text-anchor="middle" fill="#fde68a" font-size="9">Test + Debug</text>
  <text x="695" y="180" text-anchor="middle" fill="#fcd34d" font-size="8">/tgd-verify</text>

  <!-- Arrow 5→6 -->
  <line x1="760" y1="131" x2="780" y2="131" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 6: REVIEW -->
  <rect x="780" y="95" width="130" height="72" rx="10" fill="url(#rose)" stroke="#fb7185" stroke-width="1.5" filter="url(#glow)"/>
  <text x="845" y="122" text-anchor="middle" fill="#fff1f2" font-size="18">🔎</text>
  <text x="845" y="142" text-anchor="middle" fill="#fff1f2" font-size="12" font-weight="600">REVIEW</text>
  <text x="845" y="156" text-anchor="middle" fill="#fecdd3" font-size="9">QA + Review</text>
  <text x="845" y="180" text-anchor="middle" fill="#fda4af" font-size="8">/tgd-review</text>

  <!-- Arrow 6→7 -->
  <line x1="910" y1="131" x2="930" y2="131" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 7: RELEASE -->
  <rect x="930" y="95" width="130" height="72" rx="10" fill="url(#indigo)" stroke="#818cf8" stroke-width="1.5" filter="url(#glow)"/>
  <text x="995" y="122" text-anchor="middle" fill="#eef2ff" font-size="18">🚀</text>
  <text x="995" y="142" text-anchor="middle" fill="#eef2ff" font-size="12" font-weight="600">RELEASE</text>
  <text x="995" y="156" text-anchor="middle" fill="#c7d2fe" font-size="9">Git + CI/CD + Docs</text>
  <text x="995" y="180" text-anchor="middle" fill="#a5b4fc" font-size="8">/tgd-release</text>

  <!-- Bottom feature cards -->
  <!-- Card 1 -->
  <rect x="30" y="210" width="270" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="240" fill="#22d3ee" font-size="11" font-weight="700">🎯 23 SKILLS</text>
  <text x="50" y="260" fill="#cbd5e1" font-size="10">• Context Engineering</text>
  <text x="50" y="276" fill="#cbd5e1" font-size="10">• Spec-Driven Development</text>
  <text x="50" y="292" fill="#cbd5e1" font-size="10">• Test-Driven Development</text>
  <text x="50" y="308" fill="#cbd5e1" font-size="10">• Code Review &amp; Quality</text>
  <text x="50" y="324" fill="#cbd5e1" font-size="10">• + 19 more...</text>

  <!-- Card 2 -->
  <rect x="315" y="210" width="270" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="335" y="240" fill="#34d399" font-size="11" font-weight="700">🤖 4 PLATFORMS</text>
  <text x="335" y="260" fill="#cbd5e1" font-size="10">• Claude Code (Claude.ai)</text>
  <text x="335" y="276" fill="#cbd5e1" font-size="10">• OpenAI Codex CLI</text>
  <text x="335" y="292" fill="#cbd5e1" font-size="10">• Gemini CLI</text>
  <text x="335" y="308" fill="#cbd5e1" font-size="10">• OpenCode</text>
  <text x="335" y="324" fill="#cbd5e1" font-size="10">• + Cursor, Windsurf...</text>

  <!-- Card 3 -->
  <rect x="600" y="210" width="270" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="620" y="240" fill="#fbbf24" font-size="11" font-weight="700">🔒 QUALITY GATES</text>
  <text x="620" y="260" fill="#cbd5e1" font-size="10">• Three-Gate Pre-Flight</text>
  <text x="620" y="276" fill="#cbd5e1" font-size="10">• Feature Branch Enforcement</text>
  <text x="620" y="292" fill="#cbd5e1" font-size="10">• Artifact Verification</text>
  <text x="620" y="308" fill="#cbd5e1" font-size="10">• UI Design Gate</text>
  <text x="620" y="324" fill="#cbd5e1" font-size="10">• Verification Checklists</text>

  <!-- Card 4 -->
  <rect x="885" y="210" width="285" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="905" y="240" fill="#fb7185" font-size="11" font-weight="700">🔗 INTEGRATIONS</text>
  <text x="905" y="260" fill="#cbd5e1" font-size="10">• Jira Data Center (auto-sync)</text>
  <text x="905" y="276" fill="#cbd5e1" font-size="10">• CodeGraph (offline AST index)</text>
  <text x="905" y="292" fill="#cbd5e1" font-size="10">• Browser Testing (DevTools)</text>
  <text x="905" y="308" fill="#cbd5e1" font-size="10">• CI/CD &amp; Deployment</text>
  <text x="905" y="324" fill="#cbd5e1" font-size="10">• Air-Gap Compatible</text>
</svg>
</body>
</html>
