<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>tGD — README</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa; --bg-card: #f3f4f6; --bg-code: #f1f3f5;
            --text: #1a1a1a; --text-muted: #6b7280; --accent: #2563eb;
            --border: #e5e7eb; --shadow: rgba(0,0,0,0.05);
        }
        body.dark {
            --bg: #0c0f1a; --bg-card: #121620; --bg-code: #1a1e2e;
            --text: #e5e5e5; --text-muted: #737373; --accent: #3b82f6;
            --border: #262626; --shadow: rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg); border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }
        .navbar .container { max-width: 900px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-weight: 700; font-size: 20px; color: var(--text); text-decoration: none; }
        .navbar-brand span { color: var(--accent); }
        .navbar-links { display: flex; gap: 16px; align-items: center; }
        .navbar-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .navbar-links a:hover { color: var(--text); }
        .btn-gh {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
            text-decoration: none; transition: all 0.2s;
        }
        .btn-gh:hover { border-color: var(--accent); color: var(--accent); }
        .theme-toggle {
            background: none; border: 1px solid var(--border); border-radius: 8px;
            padding: 6px; cursor: pointer; color: var(--text-muted);
        }
        .content { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
        .content h1 { font-size: 2.2em; font-weight: 800; margin: 48px 0 16px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        .content h2 { font-size: 1.6em; font-weight: 700; margin: 40px 0 12px; color: var(--accent); }
        .content h3 { font-size: 1.2em; font-weight: 600; margin: 28px 0 8px; }
        .content p { margin: 12px 0; }
        .content a { color: var(--accent); text-decoration: none; }
        .content a:hover { text-decoration: underline; }
        .content ul, .content ol { margin: 12px 0 12px 24px; }
        .content li { margin: 6px 0; }
        .content code {
            font-family: 'JetBrains Mono', monospace; font-size: 0.88em;
            background: var(--bg-code); padding: 2px 6px; border-radius: 4px;
        }
        .content pre {
            background: var(--bg-code); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px; overflow-x: auto; margin: 16px 0;
        }
        .content pre code { background: none; padding: 0; }
        .content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.95em; }
        .content th, .content td { padding: 10px 14px; border: 1px solid var(--border); text-align: left; }
        .content th { background: var(--bg-card); font-weight: 600; }
        .content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 16px 0; background: var(--bg-card); border-radius: 0 8px 8px 0; }
        .content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
        .content img { max-width: 100%; border-radius: 8px; }
        .content strong { font-weight: 700; }
        .content em { font-style: italic; }
        .loading { text-align: center; padding: 80px 0; color: var(--text-muted); }
        .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge { display: inline-block; }
        .footer { text-align: center; padding: 32px 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 14px; margin-top: 48px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">t<span>GD</span></a>
            <div class="navbar-links">
                <a href="index.html">Home</a>
                <a href="tGD-intro.html">Intro</a>
                <a href="https://github.com/openclawyhwang-hub/tGD#readme" target="_blank" class="btn-gh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    GitHub
                </a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
    </nav>

    <div class="content" id="readme-content">
        <div class="loading"><div class="spinner"></div><p>Loading README...</p></div>
    </div>

    <div class="footer">
        <p>Apache 2.0 License &bull; Built with ❤️ by the tGD community</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Theme
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        // Render README
        fetch('https://raw.githubusercontent.com/openclawyhwang-hub/tGD/main/README.md')
            .then(r => r.text())
            .then(md => {
                // Strip badge HTML (img tags with shields.io)
                md = md.replace(/<p align="center">[\s\S]*?<\/p>/g, '');
                document.getElementById('readme-content').innerHTML = marked.parse(md);
            })
            .catch(() => {
                document.getElementById('readme-content').innerHTML =
                    '<p>Failed to load README. <a href="https://github.com/openclawyhwang-hub/tGD#readme">View on GitHub →</a></p>';
            });
    </script>
</body>
</html>
