<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tGD — Agentic PDLC Dashboard</title>
<link rel="icon" href="../favicon.svg">
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --surface-2: #f5f5f4;
    --border: #e7e5e4;
    --text: #1c1917;
    --text-2: #57534e;
    --text-3: #a8a29e;
    --accent: #22c55e;
    --accent-dim: rgba(34,197,94,.12);
    --warn: #f59e0b;
    --warn-dim: rgba(245,158,11,.12);
    --error: #ef4444;
    --error-dim: rgba(239,68,68,.12);
    --info: #3b82f6;
    --info-dim: rgba(59,130,246,.12);
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  [data-theme="dark"] {
    --bg: #0c0a09;
    --surface: #1c1917;
    --surface-2: #292524;
    --border: #44403c;
    --text: #fafaf9;
    --text-2: #a8a29e;
    --text-3: #78716c;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), #16a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-2);
    transition: all .2s;
  }

  .theme-btn:hover { border-color: var(--accent); color: var(--text); }

  .kbd {
    display: inline-block;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
  }

  /* ── Main Layout ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-3);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 800;
    font-family: var(--mono);
    letter-spacing: -1px;
  }

  .stat-value.green { color: var(--accent); }
  .stat-value.yellow { color: var(--warn); }
  .stat-value.blue { color: var(--info); }
  .stat-value.red { color: var(--error); }

  /* ── Pipeline ── */
  .pipeline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .pipeline-title {
    font-size: 20px;
    font-weight: 700;
  }

  .pipeline-connector {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 32px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .pipe-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 100px;
    cursor: pointer;
    transition: transform .2s;
  }

  .pipe-node:hover { transform: translateY(-2px); }

  .pipe-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: 3px solid var(--border);
    background: var(--surface);
    transition: all .3s;
    position: relative;
  }

  .pipe-node[data-status="done"] .pipe-circle {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .pipe-node[data-status="active"] .pipe-circle {
    border-color: var(--info);
    background: var(--info-dim);
    box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    animation: pulse 2s ease-in-out infinite;
  }

  .pipe-node[data-status="error"] .pipe-circle {
    border-color: var(--error);
    background: var(--error-dim);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(59,130,246,.15); }
    50% { box-shadow: 0 0 0 8px rgba(59,130,246,.08); }
  }

  .pipe-label {
    margin-top: 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-3);
    text-align: center;
  }

  .pipe-node[data-status="done"] .pipe-label { color: var(--accent); }
  .pipe-node[data-status="active"] .pipe-label { color: var(--info); }

  .pipe-arrow {
    width: 32px;
    height: 2px;
    background: var(--border);
    margin: 0 4px;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .pipe-arrow.done { background: var(--accent); }

  /* ── Phase Cards ── */
  .phases-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .phase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all .3s;
  }

  .phase-card:hover { box-shadow: var(--shadow-lg); }

  .phase-card[data-status="active"] {
    border-color: var(--info);
    box-shadow: 0 0 0 1px var(--info), var(--shadow);
  }

  .phase-card[data-status="done"] {
    border-left: 4px solid var(--accent);
  }

  .phase-head {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }

  .phase-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .phase-icon.map { background: #dbeafe; }
  .phase-icon.define { background: #fef3c7; }
  .phase-icon.plan { background: #e0e7ff; }
  .phase-icon.build { background: #fce7f3; }
  .phase-icon.verify { background: #fee2e2; }
  .phase-icon.review { background: #d1fae5; }
  .phase-icon.simplify { background: #f3e8ff; }
  .phase-icon.ship { background: #ccfbf1; }

  [data-theme="dark"] .phase-icon.map { background: rgba(59,130,246,.15); }
  [data-theme="dark"] .phase-icon.define { background: rgba(245,158,11,.15); }
  [data-theme="dark"] .phase-icon.plan { background: rgba(99,102,241,.15); }
  [data-theme="dark"] .phase-icon.build { background: rgba(236,72,153,.15); }
  [data-theme="dark"] .phase-icon.verify { background: rgba(239,68,68,.15); }
  [data-theme="dark"] .phase-icon.review { background: rgba(34,197,94,.15); }
  [data-theme="dark"] .phase-icon.simplify { background: rgba(168,85,247,.15); }
  [data-theme="dark"] .phase-icon.ship { background: rgba(20,184,166,.15); }

  .phase-info { flex: 1; }

  .phase-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .phase-desc {
    font-size: 13px;
    color: var(--text-2);
  }

  .phase-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .phase-status {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .phase-status.pending { background: var(--surface-2); color: var(--text-3); }
  .phase-status.active { background: var(--info-dim); color: var(--info); }
  .phase-status.done { background: var(--accent-dim); color: var(--accent); }
  .phase-status.error { background: var(--error-dim); color: var(--error); }

  .phase-chevron {
    font-size: 18px;
    color: var(--text-3);
    transition: transform .3s;
  }

  .phase-card.open .phase-chevron { transform: rotate(180deg); }

  .phase-body {
    display: none;
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
  }

  .phase-card.open .phase-body { display: block; }

  .phase-section {
    margin-top: 20px;
  }

  .phase-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  .skill-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .skill-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    transition: all .2s;
  }

  .skill-tag:hover { border-color: var(--accent); color: var(--text); }
  .skill-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .skill-tag.conditional .dot { background: var(--warn); }

  .command-block {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .command-block code {
    white-space: nowrap;
    overflow-x: auto;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-3);
    transition: all .2s;
    flex-shrink: 0;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--text); }

  .platform-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .platform-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .platform-tag.claude { background: #fef3c7; color: #92400e; }
  .platform-tag.codex { background: #dbeafe; color: #1e40af; }
  .platform-tag.opencode { background: #e0e7ff; color: #3730a3; }
  .platform-tag.pi { background: #fce7f3; color: #9d174d; }
  .platform-tag.gemini { background: #d1fae5; color: #065f46; }

  [data-theme="dark"] .platform-tag.claude { background: rgba(245,158,11,.15); color: #fbbf24; }
  [data-theme="dark"] .platform-tag.codex { background: rgba(59,130,246,.15); color: #60a5fa; }
  [data-theme="dark"] .platform-tag.opencode { background: rgba(99,102,241,.15); color: #818cf8; }
  [data-theme="dark"] .platform-tag.pi { background: rgba(236,72,153,.15); color: #f472b6; }
  [data-theme="dark"] .platform-tag.gemini { background: rgba(34,197,94,.15); color: #4ade80; }

  /* ── Project Selector ── */
  .project-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }

  .project-bar label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
  }

  .project-input {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 14px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .project-input:focus { border-color: var(--accent); }

  .scan-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    white-space: nowrap;
  }

  .scan-btn:hover { opacity: .9; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px;
    color: var(--text-3);
    font-size: 13px;
  }

  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .main { padding: 16px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .pipe-node { min-width: 70px; }
    .pipe-circle { width: 36px; height: 36px; font-size: 16px; }
    .pipe-arrow { width: 16px; }
    .pipe-label { font-size: 9px; }
    .phase-head { padding: 16px; }
    .project-bar { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body data-theme="light">

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div>
      <div class="logo">tGD</div>
      <div class="logo-sub">Agentic PDLC Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span class="kbd">T</span>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Dark</button>
  </div>
</header>

<div class="main">

  <!-- Project Bar -->
  <div class="project-bar">
    <label>📂 Project</label>
    <input class="project-input" id="projectPath" placeholder="~/my-project (paste path or scan)" value="">
    <button class="scan-btn" onclick="scanProject()">Scan tGD/</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Completed</div>
      <div class="stat-value green" id="statDone">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Progress</div>
      <div class="stat-value blue" id="statActive">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value yellow" id="statPending">8</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Skills Loaded</div>
      <div class="stat-value" id="statSkills">28</div>
    </div>
  </div>

  <!-- Pipeline Visual -->
  <div class="pipeline-header">
    <div class="pipeline-title">Pipeline</div>
  </div>
  <div class="pipeline-connector" id="pipelineViz"></div>

  <!-- Phase Cards -->
  <div class="phases-grid" id="phasesGrid"></div>

</div>

<!-- Footer -->
<div class="footer">
  tGD — Agentic PDLC Harness &nbsp;·&nbsp;
  <a href="https://github.com/openclawyhwang-hub/tGD">GitHub</a> &nbsp;·&nbsp;
  <a href="tGD-intro.html">Pitch Deck</a> &nbsp;·&nbsp;
  Press <kbd>T</kbd> to toggle theme
</div>

<script>
const PHASES = [
  {
    id: 'map', name: 'Map', icon: '🗺️', cssClass: 'map',
    command: '/tgd-map',
    desc: 'Scan and understand the existing project context',
    skills: [
      { name: 'context-engineering', required: true },
      { name: 'codegraph init', required: true, note: 'external CLI' },
    ],
    platforms: ['claude', 'codex', 'opencode', 'pi', 'gemini'],
    outputs: ['tGD/map/CONTEXT.md', '.codegraph/codegraph.db'],
    verify: 'CONTEXT.md exists and is non-empty',
  },
  {
    id: 'define', name: 'Define', icon: '📝', cssClass: 'define',
    command: '/tgd-define',
    desc: 'Write PRD + SPEC before any code',
    skills: [
      { name: 'spec-driven-development', required: true },
      { name: 'interview-me', required: false, note: 'if underspecified' },
      { name: 'idea-refine', required: false, note: 'if vague' },
    ],
    platforms: ['claude', 'codex', 'opencode', 'pi', 'gemini'],
    outputs: ['tGD/define/<feature>/PRD.md', 'tGD/define/<feature>/SPEC.md', 'DESIGN.md (if UI)'],
    verify: 'PRD.md and SPEC.md exist',
  },
  {
    id: 'plan', name: 'Plan', icon: '📐', cssClass: 'plan',
    command: '/tgd-plan',
    desc: 'Break spec into small verifiable tasks',
    skills: [
      { name: 'planning-and-task-breakdown', required: true },
      { name: 'jira-auto-sync', required: false, note: 'if Jira configured' },
    ],
    platforms: ['claude', 'codex', 'opencode', 'pi', 'gemini'],
    outputs: ['tGD/plan/<feature>/TASKS.md'],
    verify: 'TASKS.md exists with acceptance criteria',
  },
  {
    id: 'develop', name: 'Build', icon: '🔨', cssClass: 'build',
    command: '/tgd-develop',
    desc: 'Implement thin vertical slices with tests',
    skills: [
      { name: 'context-engineering', required: true },
      { name: 'source-driven-development', required: true },
      { name: 'subagent-driven-development', required: false, note: '≥3 tasks' },
      { name: 'incremental-implementation', required: false, note: '<3 tasks' },
      { name: 'test-driven-development', required: true },
      { name: 'verification-before-completion', required: true },
      { name: 'frontend-ui-engineering', required: false, note: 'if UI' },
      { name: 'api-and-interface-design', required: false, note: 'if API' },
    ],
    platforms: ['claude', 'codex', 'opencode', 'pi'],
    outputs: ['src/', 'tests/'],
    verify: 'All tasks checked, tests pass',
  },
  {
    id: 'verify', name: 'Verify', icon: '🧪', cssClass: 'verify',
    command: '/tgd-verify',
    desc: 'Debug, test, and prove it works',
    skills: [
      { name: 'debugging-and-error-recovery', required: true },
      { name: 'test-driven-development', required: true },
      { name: 'agent-browser', required: true, note: 'Hard Gate: Frontend/UI/DOM' },
    ],
    platforms: ['claude', 'codex', 'opencode', 'pi'],
    outputs: ['Test reports', 'Browser screenshots'],
    verify: 'ALL tests pass, build succeeds',
  },
  {
    id: 'review', name: 'Review', icon: '🔍', cssClass: 'review',
    command: '/tgd-review',
    desc: 'Code review, quality gates, simplification',
    skills: [
      { name: 'code-review-and-quality', required: true },
      { name: 'code-simplification', required: true },
      { name: 'security-and-hardening', required: false, note: 'if security concerns' },
      { name: 'performance-optimization', required: false, note: 'if perf concerns' },
    ],
    platforms: ['claude', 'codex', 'opencode'],
    outputs: ['Review report'],
    verify: 'Code review passes, no anti-patterns',
  },
  {
    id: 'simplify', name: 'Simplify', icon: '✂️', cssClass: 'simplify',
    command: '/tgd-simplify',
    desc: 'Remove complexity, reduce line count',
    skills: [
      { name: 'code-simplification', required: true },
    ],
    platforms: ['claude', 'codex', 'opencode'],
    outputs: ['Reduced codebase'],
    verify: 'Fewer lines, same behavior, tests pass',
  },
  {
    id: 'ship', name: 'Ship', icon: '🚀', cssClass: 'ship',
    command: '/tgd-ship',
    desc: 'Clean git history, deploy safely',
    skills: [
      { name: 'git-workflow-and-versioning', required: true },
      { name: 'shipping-and-launch', required: true },
      { name: 'ci-cd-and-automation', required: false, note: 'if CI/CD exists' },
      { name: 'documentation-and-adrs', required: false, note: 'if writing docs' },
    ],
    platforms: ['claude', 'codex', 'opencode'],
    outputs: ['Git tag', 'Deployment'],
    verify: 'Changes committed, tests pass, deployed',
  },
];

let phaseStates = PHASES.map(() => 'pending');
let activeIndex = -1;

function renderPipeline() {
  const viz = document.getElementById('pipelineViz');
  viz.innerHTML = '';
  PHASES.forEach((p, i) => {
    const status = phaseStates[i];
    const node = document.createElement('div');
    node.className = 'pipe-node';
    node.dataset.status = status;
    node.onclick = () => togglePhase(i);
    node.innerHTML = `
      <div class="pipe-circle">${p.icon}</div>
      <div class="pipe-label">${p.name}</div>
    `;
    viz.appendChild(node);
    if (i < PHASES.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'pipe-arrow' + (status === 'done' ? ' done' : '');
      viz.appendChild(arrow);
    }
  });
}

function renderPhases() {
  const grid = document.getElementById('phasesGrid');
  grid.innerHTML = '';
  PHASES.forEach((p, i) => {
    const status = phaseStates[i];
    const card = document.createElement('div');
    card.className = 'phase-card';
    card.dataset.status = status;
    card.id = 'phase-' + p.id;

    const skillTags = p.skills.map(s =>
      `<span class="skill-tag ${s.required ? '' : 'conditional'}">
        <span class="dot"></span>
        ${s.name}${s.note ? ' <span style="color:var(--text-3);font-size:11px">(' + s.note + ')</span>' : ''}
      </span>`
    ).join('');

    const platformTags = p.platforms.map(pl =>
      `<span class="platform-tag ${pl}">${pl}</span>`
    ).join('');

    const outputList = p.outputs.map(o => `<li><code>${o}</code></li>`).join('');

    card.innerHTML = `
      <div class="phase-head" onclick="togglePhase(${i})">
        <div class="phase-icon ${p.cssClass}">${p.icon}</div>
        <div class="phase-info">
          <div class="phase-name">${p.name}</div>
          <div class="phase-desc">${p.desc}</div>
        </div>
        <div class="phase-meta">
          <span class="phase-status ${status}">${status}</span>
        </div>
        <div class="phase-chevron">▼</div>
      </div>
      <div class="phase-body">
        <div class="phase-section">
          <div class="phase-section-title">Command</div>
          <div class="command-block">
            <code>${p.command}</code>
            <button class="copy-btn" onclick="copyCmd('${p.command}', this)">Copy</button>
          </div>
        </div>
        <div class="phase-section">
          <div class="phase-section-title">Skills Pipeline</div>
          <div class="skill-list">${skillTags}</div>
        </div>
        <div class="phase-section">
          <div class="phase-section-title">Supported Platforms</div>
          <div class="platform-tags">${platformTags}</div>
        </div>
        <div class="phase-section">
          <div class="phase-section-title">Outputs</div>
          <ul style="padding-left:20px;color:var(--text-2);font-size:14px">${outputList}</ul>
        </div>
        <div class="phase-section">
          <div class="phase-section-title">Verification Gate</div>
          <div style="font-size:14px;color:var(--text-2)">✅ ${p.verify}</div>
        </div>
        <div class="phase-section" style="display:flex;gap:8px;margin-top:20px">
          <button class="scan-btn" style="font-size:13px;padding:8px 16px" onclick="setStatus(${i},'done')">✓ Mark Done</button>
          <button class="theme-btn" style="font-size:13px;padding:8px 16px" onclick="setStatus(${i},'active')">▶ Set Active</button>
          <button class="theme-btn" style="font-size:13px;padding:8px 16px" onclick="setStatus(${i},'pending')">↺ Reset</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function togglePhase(i) {
  const card = document.getElementById('phase-' + PHASES[i].id);
  card.classList.toggle('open');
}

function setStatus(i, status) {
  phaseStates[i] = status;
  if (status === 'active') {
    activeIndex = i;
  }
  updateStats();
  renderPipeline();
  renderPhases();
  // Re-open the card
  document.getElementById('phase-' + PHASES[i].id).classList.add('open');
}

function updateStats() {
  const done = phaseStates.filter(s => s === 'done').length;
  const active = phaseStates.filter(s => s === 'active').length;
  const pending = phaseStates.filter(s => s === 'pending').length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statPending').textContent = pending;
}

function scanProject() {
  const path = document.getElementById('projectPath').value.trim();
  if (!path) {
    alert('Enter a project path with a tGD/ directory');
    return;
  }
  // In a real implementation, this would read the filesystem
  // For now, simulate detection
  alert('Scanning: ' + path + '\n\nThis will be connected to a backend API.\nFor now, use the manual status buttons on each phase.');
}

function copyCmd(cmd, btn) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function toggleTheme() {
  const body = document.body;
  const current = body.dataset.theme;
  const next = current === 'dark' ? 'light' : 'dark';
  body.dataset.theme = next;
  document.querySelector('.theme-btn').textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem('tgd-theme', next);
}

document.addEventListener('keydown', e => {
  if (e.key === 't' || e.key === 'T') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    toggleTheme();
  }
});

// Init
const saved = localStorage.getItem('tgd-theme');
if (saved) {
  document.body.dataset.theme = saved;
  document.querySelector('.theme-btn').textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';
}
renderPipeline();
renderPhases();
updateStats();
</script>

</body>
</html>
