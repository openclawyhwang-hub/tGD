<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tGD — Agentic PDLC Dashboard</title>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-theme="light">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">tGD</div>
      <div>
        <div class="logo-text">Agentic PDLC</div>
        <div class="logo-sub">Dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <span class="kbd-hint">T</span>
      <button class="btn-icon" id="themeToggle" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="main">

    <!-- Project Bar -->
    <section class="project-bar">
      <label class="project-label">📂 Project</label>
      <input class="project-input" id="projectPath" type="text"
             placeholder="~/my-project — paste path or use Scan">
      <button class="btn-primary" id="scanBtn">Scan tGD/</button>
    </section>

    <!-- Stats -->
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value accent" id="statDone">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active</div>
        <div class="stat-value info" id="statActive">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value warn" id="statPending">8</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Skills</div>
        <div class="stat-value" id="statSkills">28</div>
      </div>
    </section>

    <!-- Pipeline -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Pipeline</h2>
      </div>
      <div class="pipeline" id="pipelineViz"></div>
    </section>

    <!-- Phases -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Phases</h2>
      </div>
      <div class="phases-list" id="phasesList"></div>
    </section>

  </main>

  <footer class="footer">
    tGD — Agentic PDLC Harness ·
    <a href="https://github.com/openclawyhwang-hub/tGD" target="_blank">GitHub</a> ·
    <a href="https://openclawyhwang-hub.github.io/tGD/tGD-intro.html" target="_blank">Pitch Deck</a>
  </footer>

  <script type="module" src="js/phases.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
